name: FGH-Renew
on:
  workflow_dispatch:
  schedule:
    - cron: '30 2,10,18 * * *'
jobs:
  run_fgh_renew:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 检出仓库
        uses: actions/checkout@v4

      - name: 🐍 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: 🛠️ 下载并启动 Xray (Argo 节点 + HTTP 透明代理)
        run: |
          echo "📥 下载最新版 Xray 内核..."
          wget -q https://github.com/XTLS/Xray-core/releases/download/v1.8.24/Xray-linux-64.zip
          unzip -q -o Xray-linux-64.zip -d xray_core
          
          echo "📝 生成 HTTP 代理配置文件..."
          cat << 'EOF' > xray_core/config.json
          {
            "inbounds": [
              {
                "port": 10809,
                "listen": "127.0.0.1",
                "protocol": "http"
              }
            ],
            "outbounds": [
              {
                "protocol": "vmess",
                "settings": {
                  "vnext": [
                    {
                      "address": "www.visa.com.sg",
                      "port": 8443,
                      "users": [
                        {
                          "id": "bd613279-ca0c-492c-90a1-3dec6d77bf95",
                          "alterId": 0,
                          "security": "auto"
                        }
                      ]
                    }
                  ]
                },
                "streamSettings": {
                  "network": "ws",
                  "security": "tls",
                  "tlsSettings": {
                    "serverName": "www.visa.com.sg",
                    "fingerprint": "chrome"
                  },
                  "wsSettings": {
                    "path": "/bd613279-ca0c-492c-90a1-3dec6d77bf95-vm"
                  }
                }
              }
            ]
          }
          EOF
          
          cd xray_core
          chmod +x xray
          echo "🚀 后台启动 Xray (监听 10809 HTTP 端口)..."
          nohup ./xray run -c config.json > xray.log 2>&1 &
          sleep 5

      - name: 🛠️ 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable xvfb x11-utils xdotool scrot

      - name: 🐍 安装 Python 依赖
        run: |
          pip install seleniumbase requests
          seleniumbase install chromedriver

      - name: 🚀 运行续期脚本 (动态切换至 HTTP 代理)
        env:
          PYTHONIOENCODING: utf-8
          FGH_ACCOUNT: ${{ secrets.FGH_ACCOUNT }}
          TG_BOT: ${{ secrets.TG_BOT }}
        run: |
          # 核心魔法：运行前，动态将 Python 脚本里的 SOCKS5 替换为 HTTP 代理
          sed -i 's/socks5:\/\/127.0.0.1:10808/http:\/\/127.0.0.1:10809/g' renew.py
          
          # 运行脚本
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python renew.py

      - name: 📸 上传截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: "*.png"
