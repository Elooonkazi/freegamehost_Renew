name: FGH-Renew
on:
  workflow_dispatch:
  schedule:
    - cron: '30 2,10,18 * * *'
jobs:
  run_fgh_renew:
    runs-on: windows-latest
    steps:
      - name: 📥 检出仓库
        uses: actions/checkout@v4

      - name: 🐍 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 🛠️ 部署虚拟网卡级别代理 (Sing-Box TUN 模式)
        shell: bash
        run: |
          echo "📥 下载 Sing-box 和 Wintun 虚拟网卡驱动..."
          curl -L -o sing-box.zip "https://github.com/SagerNet/sing-box/releases/download/v1.9.0/sing-box-1.9.0-windows-amd64.zip"
          unzip -q sing-box.zip
          mv sing-box-1.9.0-windows-amd64/sing-box.exe .
          
          curl -L -o wintun.zip "https://www.wintun.net/builds/wintun-0.14.1.zip"
          unzip -q wintun.zip
          cp wintun/bin/amd64/wintun.dll .
          
          echo "📝 生成智能路由的 TUN 配置文件..."
          cat << 'EOF' > config.json
          {
            "log": {
              "level": "info"
            },
            "inbounds": [
              {
                "type": "tun",
                "inet4_address": "172.19.0.1/30",
                "auto_route": true,
                "strict_route": false,
                "stack": "system",
                "sniff": true,
                "sniff_override_destination": true
              }
            ],
            "outbounds": [
              {
                "type": "vless",
                "tag": "proxy",
                "server": "35.208.69.48",
                "server_port": 35292,
                "uuid": "bd613279-ca0c-492c-90a1-3dec6d77bf95",
                "flow": "xtls-rprx-vision",
                "tls": {
                  "enabled": true,
                  "server_name": "apple.com",
                  "utls": {
                    "enabled": true,
                    "fingerprint": "chrome"
                  },
                  "reality": {
                    "enabled": true,
                    "public_key": "6pm6V2dVxBBzV_ApD7FuFZ0CKfLHggiVGKeI9SQxJEc",
                    "short_id": "2a507ec5"
                  }
                }
              },
              {
                "type": "direct",
                "tag": "direct"
              }
            ],
            "route": {
              "rules": [
                {
                  "domain_suffix": [".freegamehost.xyz", "freegamehost.xyz", ".freegamehost.com", "freegamehost.com"],
                  "outbound": "proxy"
                },
                {
                  "outbound": "direct"
                }
              ],
              "auto_detect_interface": true
            }
          }
          EOF
          
          echo "🚀 启动全局虚拟网卡接管..."
          ./sing-box.exe run -c config.json &
          sleep 8

      - name: 🐍 安装 Python 依赖
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install seleniumbase requests pyautogui
          seleniumbase install chromedriver

      - name: 🚀 运行纯净无感续期脚本
        shell: bash
        env:
          PYTHONIOENCODING: utf-8
          FGH_ACCOUNT: ${{ secrets.FGH_ACCOUNT }}
          TG_BOT: ${{ secrets.TG_BOT }}
        run: |
          python renew.py

      - name: 📸 上传截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: "*.png"
