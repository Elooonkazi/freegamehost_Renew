name: FGH-Renew
on:
  workflow_dispatch:
  schedule:
    - cron: '30 2,10,18 * * *'
jobs:
  run_fgh_renew:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 检出仓库
        uses: actions/checkout@v4

      - name: 🐍 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: 🛠️ 下载并启动 Xray (使用 VMess 节点 + 开启嗅探)
        run: |
          echo "📥 下载最新版 Xray 内核..."
          wget -q https://github.com/XTLS/Xray-core/releases/download/v1.8.24/Xray-linux-64.zip
          unzip -q -o Xray-linux-64.zip -d xray_core
          
          echo "📝 生成配置文件..."
          cat << 'EOF' > xray_core/config.json
          {
            "inbounds": [
              {
                "port": 10808,
                "listen": "127.0.0.1",
                "protocol": "socks",
                "sniffing": {
                  "enabled": true,
                  "destOverride": ["http", "tls"]
                },
                "settings": {"udp": true}
              }
            ],
            "outbounds": [
              {
                "protocol": "vmess",
                "settings": {
                  "vnext": [
                    {
                      "address": "35.208.69.48",
                      "port": 8880,
                      "users": [
                        {
                          "id": "bd613279-ca0c-492c-90a1-3dec6d77bf95",
                          "alterId": 0,
                          "security": "auto"
                        }
                      ]
                    }
                  ]
                },
                "streamSettings": {
                  "network": "ws",
                  "wsSettings": {
                    "path": "/bd613279-ca0c-492c-90a1-3dec6d77bf95-vm",
                    "headers": {
                      "Host": "www.bing.com"
                    }
                  }
                }
              }
            ]
          }
          EOF
          
          cd xray_core
          chmod +x xray
          
          echo "🚀 后台启动 Xray..."
          nohup ./xray run -c config.json > xray.log 2>&1 &
          
          echo "⏳ 等待内核启动..."
          sleep 5
          cat xray.log

      - name: 🛠️ 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable xvfb x11-utils xdotool scrot

      - name: 🐍 安装 Python 依赖
        run: |
          pip install seleniumbase requests
          seleniumbase install chromedriver

      - name: 🚀 运行续期脚本
        env:
          PYTHONIOENCODING: utf-8
          FGH_ACCOUNT: ${{ secrets.FGH_ACCOUNT }}
          TG_BOT: ${{ secrets.TG_BOT }}
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python renew.py

      - name: 📸 上传截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: "*.png"
