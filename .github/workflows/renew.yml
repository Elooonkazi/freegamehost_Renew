name: FGH-Renew
on:
  workflow_dispatch:
  schedule:
    - cron: '30 2,10,18 * * *'
jobs:
  run_fgh_renew:
    runs-on: windows-latest
    steps:
      - name: 📥 检出仓库
        uses: actions/checkout@v4

      - name: 🐍 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 🛠️ 下载并启动 Xray (带认证的 HTTP 代理模式)
        shell: bash
        run: |
          echo "📥 下载 Windows 版 Xray 内核..."
          curl -L -o Xray-windows-64.zip "https://github.com/XTLS/Xray-core/releases/download/v1.8.24/Xray-windows-64.zip"
          unzip -q -o Xray-windows-64.zip -d xray_core
          
          echo "📝 生成认证代理配置..."
          cat << 'EOF' > xray_core/config.json
          {
            "log": {
              "loglevel": "warning"
            },
            "inbounds": [
              {
                "port": 10808,
                "listen": "127.0.0.1",
                "protocol": "http",
                "settings": {
                  "accounts": [
                    {
                      "user": "fgh",
                      "pass": "renew"
                    }
                  ]
                }
              }
            ],
            "outbounds": [
              {
                "protocol": "vmess",
                "settings": {
                  "vnext": [
                    {
                      "address": "35.208.69.48",
                      "port": 8880,
                      "users": [
                        {
                          "id": "bd613279-ca0c-492c-90a1-3dec6d77bf95",
                          "alterId": 0,
                          "security": "auto"
                        }
                      ]
                    }
                  ]
                },
                "streamSettings": {
                  "network": "ws",
                  "wsSettings": {
                    "path": "/bd613279-ca0c-492c-90a1-3dec6d77bf95-vm",
                    "headers": {
                      "Host": "www.bing.com"
                    }
                  }
                }
              }
            ]
          }
          EOF
          
          cd xray_core
          echo "🚀 后台启动 Xray..."
          ./xray.exe run -c config.json &
          sleep 5

      - name: 🐍 安装 Python 依赖
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install seleniumbase requests
          seleniumbase install chromedriver

      - name: 🚀 运行续期脚本 (启用浏览器代理插件模式)
        shell: bash
        env:
          PYTHONIOENCODING: utf-8
          FGH_ACCOUNT: ${{ secrets.FGH_ACCOUNT }}
          TG_BOT: ${{ secrets.TG_BOT }}
        run: |
          echo "🔄 核心魔法：强制 SeleniumBase 识别账号密码，触发底层代理扩展模式！"
          sed -i 's/socks5:\/\/127.0.0.1:10808/fgh:renew@127.0.0.1:10808/g' renew.py
          
          echo "🚀 开始运行..."
          python renew.py

      - name: 📸 上传截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: "*.png"
