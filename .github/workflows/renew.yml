name: FGH-Renew
on:
  workflow_dispatch:
  schedule:
    - cron: '30 2,10,18 * * *'
jobs:
  run_fgh_renew:
    runs-on: windows-latest
    steps:
      - name: 📥 检出仓库
        uses: actions/checkout@v4

      - name: 🐍 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 🛠️ 下载并启动 Xray (Windows版 VLESS 节点)
        shell: bash  # 🌟 强制使用 bash 避开 PowerShell 的多行文本语法冲突
        run: |
          echo "📥 下载 Windows 版 Xray 内核..."
          curl -L -o Xray-windows-64.zip "https://github.com/XTLS/Xray-core/releases/download/v1.8.24/Xray-windows-64.zip"
          unzip -q -o Xray-windows-64.zip -d xray_core
          
          echo "📝 生成配置文件..."
          cat << 'EOF' > xray_core/config.json
          {
            "inbounds": [
              {
                "port": 10808,
                "listen": "127.0.0.1",
                "protocol": "socks",
                "sniffing": {
                  "enabled": true,
                  "destOverride": ["http", "tls"]
                }
              }
            ],
            "outbounds": [
              {
                "protocol": "vless",
                "settings": {
                  "vnext": [
                    {
                      "address": "35.208.69.48",
                      "port": 35292,
                      "users": [
                        {
                          "id": "bd613279-ca0c-492c-90a1-3dec6d77bf95",
                          "encryption": "none",
                          "flow": "xtls-rprx-vision"
                        }
                      ]
                    }
                  ]
                },
                "streamSettings": {
                  "network": "tcp",
                  "security": "reality",
                  "realitySettings": {
                    "serverName": "apple.com",
                    "fingerprint": "chrome",
                    "publicKey": "6pm6V2dVxBBzV_ApD7FuFZ0CKfLHggiVGKeI9SQxJEc",
                    "shortId": "2a507ec5"
                  }
                }
              }
            ]
          }
          EOF
          
          cd xray_core
          echo "🚀 后台启动 Xray..."
          ./xray.exe run -c config.json &
          sleep 5

      - name: 🐍 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install seleniumbase requests
          seleniumbase install chromedriver
          # Windows 下原生支持 GUI，无需 xvfb

      - name: 🚀 运行续期脚本
        env:
          PYTHONIOENCODING: utf-8
          FGH_ACCOUNT: ${{ secrets.FGH_ACCOUNT }}
          TG_BOT: ${{ secrets.TG_BOT }}
        run: |
          # 自动读取 renew.py 里的 socks5://127.0.0.1:10808 代理
          python renew.py

      - name: 📸 上传截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: "*.png"
