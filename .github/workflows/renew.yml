name: FGH-Renew
on:
  workflow_dispatch:
  schedule:
    - cron: '30 2,10,18 * * *'
jobs:
  run_fgh_renew:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 检出仓库
        uses: actions/checkout@v4

      - name: 🐍 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: 🛠️ 下载并启动 sing-box (VLESS Reality 节点)
        run: |
          echo "📥 下载最新版 sing-box 内核..."
          wget -q https://github.com/SagerNet/sing-box/releases/download/v1.9.0/sing-box-1.9.0-linux-amd64.tar.gz
          tar -xzf sing-box-1.9.0-linux-amd64.tar.gz
          mv sing-box-1.9.0-linux-amd64/sing-box .
          
          echo "📝 生成 sing-box 配置文件..."
          cat << 'EOF' > config.json
          {
            "log": {
              "level": "info"
            },
            "inbounds": [
              {
                "type": "mixed",
                "listen": "127.0.0.1",
                "listen_port": 10808
              }
            ],
            "outbounds": [
              {
                "type": "vless",
                "tag": "proxy",
                "server": "35.208.69.48",
                "server_port": 35292,
                "uuid": "bd613279-ca0c-492c-90a1-3dec6d77bf95",
                "flow": "xtls-rprx-vision",
                "tls": {
                  "enabled": true,
                  "server_name": "apple.com",
                  "utls": {
                    "enabled": true,
                    "fingerprint": "chrome"
                  },
                  "reality": {
                    "enabled": true,
                    "public_key": "6pm6V2dVxBBzV_ApD7FuFZ0CKfLHggiVGKeI9SQxJEc",
                    "short_id": "2a507ec5"
                  }
                }
              },
              {
                "type": "direct",
                "tag": "direct"
              }
            ],
            "route": {
              "rules": [
                {
                  "ip_is_private": true,
                  "outbound": "direct"
                }
              ],
              "auto_detect_interface": true
            }
          }
          EOF
          
          chmod +x sing-box
          echo "🚀 后台启动 sing-box (监听 10808 混合端口)..."
          nohup ./sing-box run -c config.json > sing-box.log 2>&1 &
          
          echo "⏳ 等待内核启动..."
          sleep 5
          cat sing-box.log

      - name: 🛠️ 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable xvfb x11-utils xdotool scrot

      - name: 🐍 安装 Python 依赖
        run: |
          pip install seleniumbase requests
          seleniumbase install chromedriver

      - name: 🚀 运行续期脚本 (防 DNS 泄漏模式)
        env:
          PYTHONIOENCODING: utf-8
          FGH_ACCOUNT: ${{ secrets.FGH_ACCOUNT }}
          TG_BOT: ${{ secrets.TG_BOT }}
        run: |
          # 核心魔法：强制 Chrome 使用 HTTP 代理，将 DNS 解析权完全移交给代理服务器！
          sed -i 's/socks5:\/\/127.0.0.1:10808/http:\/\/127.0.0.1:10808/g' renew.py
          
          # 运行脚本
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python renew.py

      - name: 📸 上传截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: "*.png"
